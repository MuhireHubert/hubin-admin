<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub-In Rwanda — Operations Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--gd:#0f2409;--gm:#1e5c0f;--gb:#2e8b1a;--gl:#d6edcb;--am:#c47a1a;--al:#fef3dc;--bl:#1a5fa8;--bll:#e4eef9;--rd:#b83232;--rll:#fdeaea;--pu:#6b3fa0;--pul:#f0eafc;--g9:#1a1a18;--g7:#3d3d38;--g5:#6b6b64;--g3:#b8b8b0;--g1:#f0f0eb;--g0:#fafaf7;--w:#fff;--sh:0 2px 8px rgba(0,0,0,0.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#0a1a06;color:var(--w);min-height:100vh;}
input,select,textarea,button{font-family:'DM Sans',sans-serif;}

/* LOGIN */
#pg-login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:#0f2409;border:1px solid #1e5c0f;border-radius:20px;padding:40px 36px;width:100%;max-width:400px;text-align:center;}
.login-logo{font-size:48px;margin-bottom:12px;}
.login-title{font-family:'DM Serif Display',serif;font-size:26px;color:var(--w);margin-bottom:4px;}
.login-sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:28px;}
.lf{margin-bottom:14px;text-align:left;}
.ll{font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);margin-bottom:5px;display:block;}
.li{width:100%;padding:11px 14px;background:#162a0f;border:1.5px solid #1e5c0f;border-radius:8px;font-size:14px;color:var(--w);outline:none;}
.li:focus{border-color:var(--gb);}
.lerr{background:var(--rll);border:1px solid var(--rd);color:var(--rd);border-radius:8px;padding:10px;font-size:13px;margin-bottom:12px;display:none;}
.lbtn{width:100%;padding:13px;background:var(--gm);border:none;border-radius:8px;color:var(--w);font-size:15px;font-weight:700;cursor:pointer;}
.lbtn:hover{background:var(--gb);}

/* DASHBOARD */
#pg-dash{display:none;flex-direction:row;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:220px;background:#0a1a06;border-right:1px solid #1a3a0f;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;flex-shrink:0;}
.sb-logo{padding:22px 18px 14px;border-bottom:1px solid #1a3a0f;}
.sb-name{font-family:'DM Serif Display',serif;font-size:18px;color:var(--w);}
.sb-sub{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px;}
.sb-section{font-size:9px;font-weight:700;color:rgba(255,255,255,0.25);letter-spacing:.1em;padding:16px 18px 6px;text-transform:uppercase;}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;border-radius:0;transition:all 0.15s;color:rgba(255,255,255,0.5);font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;}
.sb-item:hover{background:#0f2409;color:var(--w);}
.sb-item.active{background:#162a0f;color:var(--gb);font-weight:700;border-left:3px solid var(--gb);}
.sb-item .si{font-size:16px;width:20px;text-align:center;}
.sb-bottom{margin-top:auto;padding:16px 18px;border-top:1px solid #1a3a0f;}
.sb-user{font-size:12px;color:rgba(255,255,255,0.4);}
.sb-logout{background:none;border:1px solid #1a3a0f;color:rgba(255,255,255,0.4);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:8px;width:100%;}
.sb-logout:hover{background:#1a3a0f;color:var(--w);}

/* MAIN */
.main{margin-left:220px;padding:28px;flex:1;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.page-title{font-family:'DM Serif Display',serif;font-size:28px;color:var(--w);}
.page-sub{font-size:13px;color:rgba(255,255,255,0.35);margin-top:2px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.live-dot{width:8px;height:8px;background:#2e8b1a;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.live-lbl{font-size:12px;color:rgba(255,255,255,0.4);}

/* CARDS */
.card{background:#0f2409;border:1px solid #1a3a0f;border-radius:12px;padding:18px;}
.ct{font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;}
.screen{display:none;animation:fi 0.2s ease;}
.screen.show{display:block;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.stat-box{background:#0f2409;border:1px solid #1a3a0f;border-radius:12px;padding:16px;}
.stat-val{font-family:'DM Serif Display',serif;font-size:32px;color:var(--w);margin-bottom:4px;}
.stat-lbl{font-size:12px;color:rgba(255,255,255,0.4);}
.stat-trend{font-size:11px;font-weight:700;margin-top:4px;}
.trend-up{color:var(--gb);} .trend-dn{color:var(--rd);}

/* TABLE */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{border-bottom:1px solid #1a3a0f;}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid #0f2409;color:rgba(255,255,255,0.75);vertical-align:middle;}
tr:hover td{background:#0f2409;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.bg{background:var(--gl);color:var(--gd);} .ba{background:var(--al);color:var(--am);} .bb{background:var(--bll);color:var(--bl);} .bgr{background:#222;color:#888;} .bp{background:var(--pul);color:var(--pu);}

/* FORMS */
.fg{margin-bottom:14px;}
.fl{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:5px;display:block;}
.fi2{width:100%;padding:10px 13px;background:#162a0f;border:1.5px solid #1a3a0f;border-radius:8px;font-size:14px;color:var(--w);outline:none;}
.fi2:focus{border-color:var(--gb);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;}
.btn-g{background:var(--gm);color:var(--w);} .btn-g:hover{background:var(--gb);}
.btn-r{background:var(--rd);color:var(--w);}
.btn-og{background:none;border:1.5px solid var(--gb);color:var(--gb);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-full{width:100%;padding:11px;}

/* UPLOAD */
.upload-zone{border:2px dashed #1e5c0f;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;}
.upload-zone:hover{border-color:var(--gb);background:#0f2409;}
.upload-preview{width:72px;height:72px;border-radius:10px;object-fit:cover;margin:8px auto;display:block;border:2px solid #1e5c0f;}

/* PRICE GRID */
.price-region-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.prtab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid #1a3a0f;background:none;color:rgba(255,255,255,0.4);cursor:pointer;}
.prtab.active{background:var(--gm);color:var(--w);border-color:var(--gm);}
.price-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1a3a0f;}
.price-row:last-child{border-bottom:none;}
.pr-icon{width:40px;height:40px;border-radius:8px;object-fit:cover;background:#162a0f;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.pr-icon img{width:40px;height:40px;border-radius:8px;object-fit:cover;}
.pr-name{flex:1;font-size:14px;font-weight:600;color:var(--w);}
.pr-inp{width:90px;padding:7px 10px;background:#162a0f;border:1.5px solid #1a3a0f;border-radius:8px;font-size:14px;font-weight:700;color:var(--gb);text-align:right;outline:none;}
.pr-inp:focus{border-color:var(--gb);}
.pr-change{width:60px;text-align:right;font-size:12px;font-weight:700;}
.pr-del{background:none;border:none;color:#333;font-size:16px;cursor:pointer;padding:4px;}
.pr-del:hover{color:var(--rd);}

/* DELIVERY TRACKER */
.delivery-card{background:#0f2409;border:1px solid #1a3a0f;border-radius:10px;padding:14px;margin-bottom:10px;}
.dc-route{font-size:15px;font-weight:700;color:var(--w);margin-bottom:4px;}
.dc-meta{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:12px;}
.dc-steps{display:flex;align-items:center;gap:0;}
.dc-step{display:flex;flex-direction:column;align-items:center;flex:1;}
.dc-dot{width:14px;height:14px;border-radius:50%;border:2px solid #1a3a0f;background:#0a1a06;}
.dc-dot.done{background:var(--gb);border-color:var(--gb);}
.dc-dot.active{background:var(--am);border-color:var(--am);}
.dc-line{flex:1;height:2px;background:#1a3a0f;margin-top:6px;}
.dc-line.done{background:var(--gb);}
.dc-lbl{font-size:9px;color:rgba(255,255,255,0.3);margin-top:5px;text-align:center;max-width:55px;}
.dc-lbl.active{color:var(--am);}

/* CHAT MODERATION */
.chat-list{display:flex;flex-direction:column;gap:8px;}
.chat-item{background:#0f2409;border:1px solid #1a3a0f;border-radius:10px;padding:12px;cursor:pointer;}
.chat-item:hover{border-color:#1e5c0f;}
.chat-item.flagged{border-color:var(--rd);}
.chat-item.locked{border-color:#555;opacity:0.7;}
.ci-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.ci-parties{font-size:13px;font-weight:600;color:var(--w);}
.ci-time{font-size:11px;color:rgba(255,255,255,0.3);}
.ci-preview{font-size:12px;color:rgba(255,255,255,0.4);}
.ci-flag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--rll);color:var(--rd);}
/* Admin message thread */
.admin-msg-wrap{max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:14px;padding:4px 0;}
.admin-msg{border-radius:8px;padding:10px 13px;}
.admin-msg.normal{background:#162a0f;border:1px solid #1a3a0f;}
.admin-msg.blocked{background:rgba(184,50,50,0.12);border:1px solid var(--rd);}
.admin-msg.official{background:rgba(196,122,26,0.15);border:1px solid var(--am);}
.msg-sender{font-size:11px;font-weight:700;margin-bottom:4px;}
.msg-text{font-size:13px;color:rgba(255,255,255,0.85);line-height:1.5;}
.msg-text.blocked-text{color:rgba(255,255,255,0.35);font-style:italic;}
.msg-time-lbl{font-size:10px;color:rgba(255,255,255,0.25);margin-top:4px;}
.admin-compose{background:#0a1a06;border:1px solid #1a3a0f;border-radius:10px;padding:14px;margin-top:2px;}
.compose-type-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.compose-type-btn{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid #1a3a0f;background:none;color:rgba(255,255,255,0.4);cursor:pointer;}
.compose-type-btn.active{background:var(--gm);color:var(--w);border-color:var(--gm);}
.compose-type-btn.warn{border-color:var(--am);}
.compose-type-btn.warn.active{background:var(--am);border-color:var(--am);}
.compose-type-btn.ban{border-color:var(--rd);}
.compose-type-btn.ban.active{background:var(--rd);border-color:var(--rd);}
.compose-inp{width:100%;background:#162a0f;border:1.5px solid #1a3a0f;border-radius:8px;padding:10px 13px;font-size:13px;color:var(--w);resize:none;outline:none;min-height:70px;}
.compose-inp:focus{border-color:var(--gb);}
.compose-actions{display:flex;gap:8px;margin-top:10px;align-items:center;}
.lock-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:#333;color:#888;}
.lock-badge.locked{background:rgba(184,50,50,0.2);color:var(--rd);}

/* AQA */
.aqa-card{background:#0f2409;border:1px solid #1a3a0f;border-radius:10px;padding:14px;margin-bottom:10px;}
.aqa-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.aqa-title{font-size:14px;font-weight:600;color:var(--w);}
.aqa-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px;}
.aqa-actions{display:flex;gap:8px;margin-top:12px;}

/* QA PHOTO */
.qa-photos{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.qa-photo{width:80px;height:80px;border-radius:8px;object-fit:cover;border:1px solid #1a3a0f;}

/* SECTION GRID */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.loading-inline{text-align:center;padding:30px;color:rgba(255,255,255,0.2);font-size:13px;}
.empty{text-align:center;padding:40px;color:rgba(255,255,255,0.2);font-size:13px;}
.toast{position:fixed;bottom:24px;right:24px;background:#162a0f;border:1px solid var(--gb);color:var(--w);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity 0.3s;z-index:999;}
.toast.show{opacity:1;}

/* REVENUE CHART */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 0 24px;position:relative;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;background:var(--gm);border-radius:4px 4px 0 0;transition:height 0.5s;min-height:4px;}
.bar-lbl{font-size:9px;color:rgba(255,255,255,0.3);white-space:nowrap;}
.bar-val{font-size:9px;color:var(--gb);font-weight:700;}

/* SEARCH */
.search-bar{display:flex;gap:10px;margin-bottom:16px;}
.search-inp{flex:1;padding:9px 14px;background:#162a0f;border:1.5px solid #1a3a0f;border-radius:8px;font-size:13px;color:var(--w);outline:none;}
.search-inp:focus{border-color:var(--gb);}
.filter-sel{padding:9px 13px;background:#162a0f;border:1.5px solid #1a3a0f;border-radius:8px;font-size:13px;color:var(--w);outline:none;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal-box{background:#0f2409;border:1px solid #1e5c0f;border-radius:16px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--w);margin-bottom:4px;}
.modal-sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:20px;}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.modal-actions .btn{flex:1;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="pg-login">
  <div class="login-box">
    <div class="login-logo">🌾</div>
    <div class="login-title">Hub-In Rwanda</div>
    <div class="login-sub">Operations Dashboard — Restricted Access</div><div style="margin-top:8px;font-size:11px;color:rgba(255,255,255,0.2);">hub-in-admin.vercel.app</div>

<div id="pg-dash">

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,doc,addDoc,setDoc,getDoc,getDocs,updateDoc,deleteDoc,query,where,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import{getStorage,ref,uploadBytes,getDownloadURL}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const FC={apiKey:"AIzaSyDPmXpUzzz1kU9JnnbyoTW6f80cqV2Wauk",authDomain:"agriconnect-8d029.firebaseapp.com",projectId:"agriconnect-8d029",storageBucket:"agriconnect-8d029.firebasestorage.app",messagingSenderId:"215579651241",appId:"1:215579651241:web:ecd2a8be0a414cea910db8"};
const fbApp=initializeApp(FC);
const db=getFirestore(fbApp);
const storage=getStorage(fbApp);

const ADMIN_USER='hubin-admin', ADMIN_PASS='AgriAdmin@2026';
const REGIONS=['Rwanda (All)','Eastern Province','Western Province','Northern Province','Southern Province','Kigali City','Uganda','Kenya','Tanzania'];
let S={loggedIn:false,priceRegion:'Rwanda (All)'};
let CROPS=[];

// ── LOGIN ──
window.doLogin=function(){
  const u=document.getElementById('a-user').value.trim();
  const p=document.getElementById('a-pass').value;
  if(u===ADMIN_USER&&p===ADMIN_PASS){
    S.loggedIn=true;
    document.getElementById('pg-login').style.display='none';
    document.getElementById('pg-dash').style.display='flex';
    loadCrops().then(()=>showScreen('overview'));
  }else{
    const e=document.getElementById('lerr');

window.filterUsers=function(){
  const q=(document.getElementById('user-search')?.value||'').toLowerCase();
  const r=document.getElementById('user-role-filter')?.value||'';

    const match=!q||(u.fname+' '+u.lname+u.phone+u.loc).toLowerCase().includes(q);

    return match&&roleMatch;
  });
  renderUsersTable(filtered);
};

function renderDeliveries(jobs){
  const cont=document.getElementById('deliveries-list');
  if(!jobs.length){cont.innerHTML=`<div class="empty">No deliveries found.</div>`;return;}
  const steps=['open','in_progress','loaded','delivered'];
  const stepLabels=['Job open','At farm','Loaded','Delivered'];
  cont.innerHTML=jobs.map(j=>{
    const si=steps.indexOf(j.status);
    const stepsHtml=stepLabels.map((lbl,i)=>`
      <div class="dc-step">
        <div class="dc-dot ${i<si?'done':i===si?'active':''}"></div>
        <div class="dc-lbl ${i===si?'active':''}">${lbl}</div>
      </div>${i<stepLabels.length-1?`<div class="dc-line" style="flex:1;height:2px;background:${i<si?'var(--gb)':'#1a3a0f'};margin-top:6px"></div>`:''}`).join('');
    return `<div class="delivery-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
        <div class="dc-route">${j.from||'?'} → ${j.to||'?'}</div>
        <span class="badge ${j.status==='delivered'?'bg':j.status==='open'?'bgr':'ba'}">${j.status}</span>
      </div>
      <div class="dc-meta">${j.cargo||''} · Broker: ${j.brokerName||'?'} · Transporter: ${j.transporterName||'Unassigned'}</div>
      <div class="dc-steps" style="display:flex;align-items:center;">${stepsHtml}</div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        ${j.status==='in_progress'?`<button class="btn btn-og btn-sm" onclick="adminUpdateDelivery('${j.id}','loaded')">Mark loaded</button>`:''}
        ${j.status==='loaded'?`<button class="btn btn-g btn-sm" onclick="adminUpdateDelivery('${j.id}','delivered')">Mark delivered</button>`:''}
        ${j.status==='open'?`<button class="btn btn-og btn-sm" onclick="adminUpdateDelivery('${j.id}','in_progress')">Force assign</button>`:''}
      </div>
    </div>`;
  }).join('');
}

window.filterDeliveries=function(){
  const f=document.getElementById('del-filter')?.value||'';
  renderDeliveries((window._all_jobs||[]).filter(j=>!f||j.status===f));
};
window.adminUpdateDelivery=async function(id,status){
  await updateDoc(doc(db,'jobs',id),{status,updatedAt:serverTimestamp()});
  toast(`✅ Delivery updated to: ${status}`);loadDeliveries();
};

async function loadAQA(){
  const el=document.getElementById('screen-aqa');
  el.innerHTML=`<div class="topbar"><div><div class="page-title">Quality Assurance (AQA)</div><div class="page-sub">AgriConnect field inspection requests</div></div><button class="btn btn-g btn-sm" onclick="openNewAQA()">+ New inspection</button></div>

    <div class="stat-box"><div class="stat-val" id="aqa-done">—</div><div class="stat-lbl">Completed</div></div>
    <div class="stat-box"><div class="stat-val" id="aqa-rev">—</div><div class="stat-lbl">AQA revenue (RWF)</div><div class="stat-trend trend-up">1% inspection fee</div></div>
  </div>
  <div id="aqa-list"><div class="loading-inline">Loading...</div></div>`;
  try{
    const snap=await getDocs(collection(db,'aqa_requests'));
    const aqa=snap.docs.map(d=>({id:d.id,...d.data()}));
    const pending=aqa.filter(a=>a.status==='pending');
    const done=aqa.filter(a=>a.status==='completed');
    const rev=done.reduce((s,a)=>s+(a.fee||0),0);
    const el=id=>document.getElementById(id);
    if(el('aqa-pending'))el('aqa-pending').textContent=pending.length;
    if(el('aqa-done'))el('aqa-done').textContent=done.length;
    if(el('aqa-rev'))el('aqa-rev').textContent=Math.round(rev/1000)+'k';
    const cont=document.getElementById('aqa-list');
    cont.innerHTML=aqa.length===0?`<div class="empty">No AQA requests yet. They appear automatically when brokers request inspection.</div>`:
      aqa.map(a=>`<div class="aqa-card">
        <div class="aqa-head">
          <div><div class="aqa-title">${a.crop||'Produce'} — ${a.farmerName||'Farmer'}</div><div class="aqa-sub">${a.location||'?'} · ${a.qty||0} kg · Fee: ${(a.fee||0).toLocaleString()} RWF</div></div>
          <span class="badge ${a.status==='completed'?'bg':a.status==='pending'?'ba':a.status==='disputed'?'bp':'bgr'}">${a.status}</span>
        </div>
        ${a.notes?`<div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:8px">${a.notes}</div>`:''}
        ${a.photos?.length?`<div class="qa-photos">${a.photos.map(p=>`<img class="qa-photo" src="${p}" alt="inspection photo">`).join('')}</div>`:''}
        <div class="aqa-actions">
          ${a.status==='pending'?`<button class="btn btn-og btn-sm" onclick="openInspectionReport('${a.id}')">Submit report</button>`:''}
          ${a.status==='pending'?`<button class="btn btn-r btn-sm" onclick="updateAQA('${a.id}','rejected')">Reject</button>`:''}
        </div>
      </div>`).join('');
  }catch(e){document.getElementById('aqa-list').innerHTML=`<div class="empty">Error: ${e.message}</div>`;}
}

window.submitInspection=async function(id){
  const notes=document.getElementById('insp-notes').value.trim();
  const grade=document.getElementById('insp-grade').value;
  const files=document.getElementById('insp-photos').files;
  if(!notes){toast('Please add inspection notes.');return;}
  const btn=document.querySelector('#modal-content .btn-g');btn.disabled=true;btn.textContent='Uploading...';
  try{
    const photoUrls=[];
    for(const file of files){
      const r=ref(storage,`aqa/${id}/${file.name}`);
      await uploadBytes(r,file);
      const url=await getDownloadURL(r);
      photoUrls.push(url);
    }
    await updateDoc(doc(db,'aqa_requests',id),{notes,grade,photos:photoUrls,status:'completed',completedAt:serverTimestamp()});
    closeModal();toast('✅ Inspection report submitted!');loadAQA();
  }catch(e){toast('❌ Error: '+e.message);btn.disabled=false;btn.textContent='Submit report';}
};

window.updateAQA=async function(id,status){

  toast('AQA updated: '+status);loadAQA();
};

async function loadChat(){

window.adminViewChat=async function(chatId){
  _currentChatId=chatId;
  // Highlight selected
  document.querySelectorAll('.chat-item').forEach(el=>el.style.borderColor='');
  const selected=document.getElementById('chatitem-'+chatId);
  if(selected)selected.style.borderColor='var(--gb)';

  const panel=document.getElementById('chat-detail-panel');
  panel.innerHTML=`<div class="loading-inline">Loading...</div>`;

  try{
    const [chatSnap,msgsSnap]=await Promise.all([
      getDoc(doc(db,'chats',chatId)),
      getDocs(collection(db,'chats',chatId,'messages')).catch(()=>({docs:[]})),
    ]);
    const chat=chatSnap.exists()?chatSnap.data():{};
    const msgs=msgsSnap.docs
      .map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));

    const isLocked=chat.locked||false;

    panel.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-shrink:0;">
        <div>
          <div style="font-size:14px;font-weight:700;font-family:monospace;">${chat.farmerName||'Farmer #????'} ↔ ${chat.brokerName||'Broker #????'}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px;">${chat.cropName||'?'} · ${chat.flaggedCount||0} blocked msgs</div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm ${isLocked?'btn-og':'btn-r'}" onclick="toggleChatLock('${chatId}',${isLocked})">
            ${isLocked?'🔓 Unlock':'🔒 Lock'}
          </button>
          <button class="btn btn-sm" style="background:#333;color:#ccc;border:none;" onclick="clearChatAdmin('${chatId}')">🗑 Clear</button>
        </div>
      </div>
      ${isLocked?`<div style="background:rgba(184,50,50,0.15);border:1px solid var(--rd);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--rd);margin-bottom:10px;flex-shrink:0;">🔒 This conversation is locked — users cannot send new messages</div>`:''}
      <div class="admin-msg-wrap" id="admin-msg-thread">
        ${msgs.length===0?`<div style="color:rgba(255,255,255,0.2);font-size:13px;text-align:center;padding:20px 0;">No messages yet</div>`:
          msgs.map(m=>{
            const isAdmin=m.senderRole==='admin';
            const isBlocked=m.blocked;
            const isOfficial=m.msgType==='official'||m.msgType==='warning';
            let cls='normal';
            if(isBlocked)cls='blocked';
            else if(isAdmin)cls='official';
            return`<div class="admin-msg ${cls}">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">
                <span class="msg-sender" style="color:${isAdmin?'var(--am)':isBlocked?'var(--rd)':'var(--gb)'}">${isAdmin?'🛡️ Hub-In Rwanda':m.senderName||'User'}</span>
                ${isBlocked?`<span class="badge bp" style="font-size:9px;">⚠️ BLOCKED</span>`:''}
                ${isAdmin&&m.msgType==='warning'?`<span class="badge ba" style="font-size:9px;">⚠️ WARNING</span>`:''}
              </div>
              <div class="msg-text ${isBlocked?'blocked-text':''}">${isBlocked?'[Blocked — attempted phone number sharing]':m.text}</div>
              <div class="msg-time-lbl">${m.createdAt?.toDate?m.createdAt.toDate().toLocaleString():'—'}</div>
            </div>`;
          }).join('')}
      </div>
      <div class="admin-compose" style="flex-shrink:0;">
        <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:8px;">ADMIN RESPONSE</div>
        <div class="compose-type-row">
          <button class="compose-type-btn active" id="ctype-official" onclick="setMsgType('official')">📢 Official</button>
          <button class="compose-type-btn warn" id="ctype-warning" onclick="setMsgType('warning')">⚠️ Warning</button>
        </div>
        <textarea class="compose-inp" id="admin-compose-text" placeholder="Type your message to both parties in this conversation..."></textarea>
        <div class="compose-actions">
          <button class="btn btn-g btn-sm" onclick="sendAdminMsg('${chatId}')">Send to conversation</button>
          <div style="font-size:11px;color:rgba(255,255,255,0.25);flex:1;">Both parties will see this message marked as Hub-In Rwanda official.</div>
        </div>
      </div>`;

    // Scroll messages to bottom
    const thread=document.getElementById('admin-msg-thread');
    if(thread)thread.scrollTop=thread.scrollHeight;
  }catch(e){
    panel.innerHTML=`<div class="empty">Error loading chat: ${e.message}</div>`;
  }
};

window.setMsgType=function(type){
  _adminMsgType=type;
  document.querySelectorAll('.compose-type-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('ctype-'+type);
  if(btn)btn.classList.add('active');
};

window.sendAdminMsg=async function(chatId){
  const text=document.getElementById('admin-compose-text')?.value.trim();
  if(!text){toast('Please type a message.');return;}
  try{
    // Send into the chat subcollection — visible to both farmer and broker
    await addDoc(collection(db,'chats',chatId,'messages'),{
      senderId:'admin',
      senderName:'Hub-In Rwanda',
      senderRole:'admin',
      msgType:_adminMsgType,
      text,
      blocked:false,
      createdAt:serverTimestamp(),
    });
    // Update chat metadata
    await updateDoc(doc(db,'chats',chatId),{
      lastMessage:`[Hub-In] ${text.slice(0,50)}`,
      lastAt:serverTimestamp(),
    }).catch(()=>{});
    const inp=document.getElementById('admin-compose-text');
    if(inp)inp.value='';
    toast('✅ Message sent to conversation.');
    // Refresh the panel
    await adminViewChat(chatId);
  }catch(e){toast('❌ Error: '+e.message);}
};

window.toggleChatLock=async function(chatId,currentlyLocked){
  const action=currentlyLocked?'unlock':'lock';
  if(!confirm(`${action.charAt(0).toUpperCase()+action.slice(1)} this conversation? Users ${currentlyLocked?'will':'will not'} be able to send messages.`))return;
  await updateDoc(doc(db,'chats',chatId),{locked:!currentlyLocked,lockedAt:serverTimestamp()});
  toast(`✅ Conversation ${action}ed.`);
  await adminViewChat(chatId);
  loadChat(); // Refresh list badges
};

window.clearChatAdmin=async function(chatId){
  if(!confirm('Clear all messages in this conversation? This cannot be undone.'))return;
  await updateDoc(doc(db,'chats',chatId),{cleared:true,clearedAt:serverTimestamp(),lastMessage:'[Cleared by admin]'});
  toast('Conversation cleared.');
  await adminViewChat(chatId);
  loadChat();
};

  quality:'🔍 Reminder from Hub-In Rwanda: Before confirming payment on this deal, we strongly recommend requesting an AgriConnect Quality Assurance (AQA) inspection. Our field agents will visit the farm and verify produce quality within 48 hours. Request one from your chat screen.',
};

window.setDmTemplate=function(key){
  const inp=document.getElementById('dm-text');
  if(inp&&DM_TEMPLATES[key])inp.value=DM_TEMPLATES[key];
};

window.sendDirectMsg=async function(){
  const uid=document.getElementById('dm-user-select')?.value;
  const type=document.getElementById('dm-type')?.value||'official';
  const text=document.getElementById('dm-text')?.value.trim();
  if(!uid){toast('Please select a user.');return;}
  if(!text){toast('Please type a message.');return;}
  try{
    // Save to a dedicated admin_messages collection — app will show these
    await addDoc(collection(db,'admin_messages'),{
      toUid:uid,
      fromAdmin:true,
      msgType:type,
      text,
      read:false,
      createdAt:serverTimestamp(),
    });
    closeModal();
    toast('✅ Message sent to user.');
  }catch(e){toast('❌ Error: '+e.message);}
};

// ── PRICES ──
function renderPrices(){
  const el=document.getElementById('screen-prices');
  el.innerHTML=`<div class="topbar"><div><div class="page-title">Prices</div><div class="page-sub">Set prices per region / country</div></div><button class="btn btn-g btn-sm" onclick="saveAllPrices()">Save all prices</button></div>
  <div class="price-region-tabs">${REGIONS.map(r=>`<button class="prtab ${S.priceRegion===r?'active':''}" onclick="setPriceRegion('${r}')">${r}</button>`).join('')}</div>
  <div class="card">
    <div class="ct">Prices for: ${S.priceRegion}</div>
    <div id="price-rows">${CROPS.map((c,i)=>`<div class="price-row">
      <div class="pr-icon">${c.icon&&c.icon.startsWith('http')?`<img src="${c.icon}" alt="${c.name}">`:(c.emoji||'🌾')}</div>
      <div class="pr-name">${c.name}</div>
      <input class="pr-inp" id="price-${i}" type="number" value="${(c.prices&&c.prices[S.priceRegion])||c.price||0}">
      <span class="pr-change" style="color:${(c.change||0)>0?'var(--gb)':'var(--rd)'}">${(c.change||0)>0?'+':''}${c.change||0}%</span>
      <span style="font-size:11px;color:rgba(255,255,255,0.3)">RWF/kg</span>
    </div>`).join('')}</div>
  </div>`;
}

window.setPriceRegion=function(r){S.priceRegion=r;renderPrices();};

window.saveAllPrices=async function(){
  try{
    const updates=CROPS.map(async(c,i)=>{
      const inp=document.getElementById(`price-${i}`);if(!inp)return;
      const newPrice=parseFloat(inp.value);if(isNaN(newPrice)||newPrice<=0)return;
      if(!c.prices)c.prices={};
      const oldPrice=c.prices[S.priceRegion]||c.price||newPrice;
      c.prices[S.priceRegion]=newPrice;
      c.change=Math.round(((newPrice-oldPrice)/oldPrice)*100);
      if(c.id){await updateDoc(doc(db,'crops',c.id),{prices:c.prices,change:c.change,price:c.prices['Rwanda (All)']||newPrice});}
      else{const r=await addDoc(collection(db,'crops'),{...c});c.id=r.id;}
    });
    await Promise.all(updates);
    toast('✅ Prices saved for '+S.priceRegion+'!');
  }catch(e){toast('❌ Error: '+e.message);}
};

// ── CROPS & ICONS ──
function renderCrops(){
  const el=document.getElementById('screen-crops');
  el.innerHTML=`<div class="topbar"><div><div class="page-title">Crops & Icons</div><div class="page-sub">Admin-controlled crop catalogue with photo icons</div></div></div>
  <div class="two-col">
    <div class="card">
      <div class="ct">Current crops</div>
      <div id="crop-admin-list">${CROPS.map((c,i)=>`<div class="price-row">
        <div class="pr-icon">${c.icon&&c.icon.startsWith('http')?`<img src="${c.icon}" alt="${c.name}">`:(c.emoji||'🌾')}</div>
        <div class="pr-name">${c.name}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.4)">${c.prices?.['Rwanda (All)']||c.price||0} RWF/kg</div>
        <label style="cursor:pointer;margin-left:auto;">
          <span class="btn btn-og btn-sm">📷 Upload icon</span>
          <input type="file" accept="image/*" style="display:none" onchange="uploadCropIcon(${i}, this)">
        </label>
        <button class="pr-del" onclick="deleteCropAdmin(${i},'${c.id||''}')">🗑️</button>
      </div>`).join('')}</div>
    </div>
    <div class="card">
      <div class="ct">Add new crop</div>
      <div class="fg"><label class="fl">Crop name</label><input class="fi2" id="nc-name" placeholder="e.g. Groundnuts"></div>
      <div class="frow">
        <div class="fg"><label class="fl">Emoji (fallback)</label><input class="fi2" id="nc-emoji" placeholder="🥜" style="font-size:20px"></div>
        <div class="fg"><label class="fl">Type slug</label><input class="fi2" id="nc-type" placeholder="groundnuts"></div>
      </div>
      <div class="fg"><label class="fl">Base price (RWF/kg)</label><input class="fi2" id="nc-price" type="number" placeholder="400"></div>
      <div class="fg"><label class="fl">Crop icon photo</label>
        <div class="upload-zone" onclick="document.getElementById('nc-photo').click()">
          <div id="nc-preview-wrap">📷 Click to upload crop photo</div>
          <input type="file" id="nc-photo" accept="image/*" style="display:none" onchange="previewNewCrop(this)">
        </div>
      </div>
      <button class="btn btn-g btn-full" onclick="addCropAdmin()">Add crop</button>
    </div>
  </div>`;
}

window.previewNewCrop=function(input){
  const file=input.files[0];if(!file)return;
  const url=URL.createObjectURL(file);
  document.getElementById('nc-preview-wrap').innerHTML=`<img src="${url}" class="upload-preview">`;
};

window.uploadCropIcon=async function(idx,input){
  const file=input.files[0];if(!file)return;
  toast('Uploading icon...');
  try{
    const r=ref(storage,`crop-icons/${CROPS[idx].type||idx}_${Date.now()}`);
    await uploadBytes(r,file);
    const url=await getDownloadURL(r);
    CROPS[idx].icon=url;
    if(CROPS[idx].id){await updateDoc(doc(db,'crops',CROPS[idx].id),{icon:url,emoji:CROPS[idx].emoji||'🌾'});}
    toast('✅ Icon updated!');renderCrops();
  }catch(e){toast('❌ Upload failed: '+e.message);}
};

window.addCropAdmin=async function(){
  const name=document.getElementById('nc-name').value.trim();
  const emoji=document.getElementById('nc-emoji').value.trim()||'🌾';
  const type=document.getElementById('nc-type').value.trim()||name.toLowerCase().replace(/\s+/g,'-');
  const price=parseFloat(document.getElementById('nc-price').value)||0;
  const file=document.getElementById('nc-photo').files[0];
  if(!name||!price){toast('Please enter crop name and price.');return;}
  toast('Saving...');
  try{
    let iconUrl=null;
    if(file){
      try{
        const uploadP=async()=>{
          const r=ref(storage,`crop-icons/${type}_${Date.now()}`);
          await uploadBytes(r,file);
          return await getDownloadURL(r);
        };
        const timeoutP=new Promise((_,rej)=>setTimeout(()=>rej(new Error('Upload timeout - Storage rules may need updating')),15000));
        iconUrl=await Promise.race([uploadP(),timeoutP]);
      }catch(uploadErr){
        toast('⚠️ Icon upload failed: '+uploadErr.message+'. Crop saved without icon.');
        iconUrl=null;
      }
    }
    const newCrop={name,emoji:emoji||'🌾',icon:iconUrl||null,type,price,prices:{'Rwanda (All)':price},change:0};
    const docRef=await addDoc(collection(db,'crops'),newCrop);
    CROPS.push({...newCrop,id:docRef.id});
    toast('✅ Crop added!');renderCrops();
  }catch(e){toast('❌ Error: '+e.message);}
};

window.deleteCropAdmin=async function(idx,fid){
  if(!confirm(`Delete ${CROPS[idx]?.name}?`))return;
  if(fid){await deleteDoc(doc(db,'crops',fid));}
  CROPS.splice(idx,1);
  toast('Crop deleted.');renderCrops();
};

// ── ALERTS ──
async function loadAlerts(){
  const el=document.getElementById('screen-alerts');
  el.innerHTML=`<div class="topbar"><div><div class="page-title">Gov Alerts</div><div class="page-sub">Published famine & supply alerts</div></div><button class="btn btn-g btn-sm" onclick="openNewAlert()">+ New alert</button></div>
  <div id="alerts-list"><div class="loading-inline">Loading...</div></div>`;
  try{
    const snap=await getDocs(collection(db,'govt_alerts'));
    const alerts=snap.docs.map(d=>({id:d.id,...d.data()}));
    document.getElementById('alerts-list').innerHTML=alerts.length===0?`<div class="empty">No alerts published yet.</div>`:
      alerts.map(a=>`<div class="aqa-card">
        <div class="aqa-head">
          <div><div class="aqa-title">${a.text}</div><div class="aqa-sub">Region: ${a.region||'all'} · ${a.createdAt?.toDate?a.createdAt.toDate().toLocaleDateString():'—'}</div></div>
          <span class="badge ${a.sev==='red'?'bp':a.sev==='amber'?'ba':'bg'}">${a.sev}</span>
        </div>
        <div style="margin-top:8px"><button class="btn btn-r btn-sm" onclick="deleteAlert('${a.id}')">Delete</button></div>
      </div>`).join('');
  }catch(e){document.getElementById('alerts-list').innerHTML=`<div class="empty">Error: ${e.message}</div>`;}
}

window.openNewAlert=function(){
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-title">Publish alert</div>
    <div class="modal-sub">Will appear in the government portal and optionally trigger SMS</div>
    <div class="fg"><label class="fl">Alert message</label><textarea class="fi2" id="al-text" rows="3" placeholder="Describe the situation..."></textarea></div>
    <div class="frow">
      <div class="fg"><label class="fl">Severity</label><select class="fi2" id="al-sev"><option value="red">Critical (Red)</option><option value="amber">Warning (Amber)</option><option value="green">Update (Green)</option></select></div>
      <div class="fg"><label class="fl">Region</label><select class="fi2" id="al-region"><option value="all">All Rwanda</option><option value="eastern">Eastern</option><option value="western">Western</option><option value="northern">Northern</option><option value="southern">Southern</option><option value="kigali">Kigali</option></select></div>
    </div>
    <div class="modal-actions"><button class="btn btn-og" onclick="closeModal()">Cancel</button><button class="btn btn-r" onclick="publishAlert()">Publish alert</button></div>`;
  document.getElementById('modal').classList.add('open');
};

window.publishAlert=async function(){
  const text=document.getElementById('al-text').value.trim();
  const sev=document.getElementById('al-sev').value;
  const region=document.getElementById('al-region').value;
  if(!text){toast('Please enter alert text.');return;}
  await addDoc(collection(db,'govt_alerts'),{text,sev,region,createdAt:serverTimestamp()});
  closeModal();toast('✅ Alert published!');loadAlerts();
};

window.deleteAlert=async function(id){
  if(!confirm('Delete this alert?'))return;
  await deleteDoc(doc(db,'govt_alerts',id));
  toast('Alert deleted.');loadAlerts();
};

// ── UTILS ──
// ── RATINGS ──
async function loadRatings(){
  const el=document.getElementById('screen-ratings');
  el.innerHTML=`<div class="topbar"><div><div class="page-title">Ratings & Reviews</div><div class="page-sub">All user ratings across the platform</div></div></div>
  <div class="three-col" style="margin-bottom:16px;" id="rat-stats"><div class="loading-inline">Loading...</div></div>
  <div class="card"><div class="tbl-wrap"><div id="rat-table"><div class="loading-inline">Loading...</div></div></div></div>`;
  try{
    const snap=await getDocs(collection(db,'ratings'));
    const ratings=snap.docs.map(d=>({id:d.id,...d.data()}));
    const avg=ratings.length?Math.round(ratings.reduce((s,r)=>s+r.stars,0)/ratings.length*10)/10:0;
    const withReview=ratings.filter(r=>r.review&&r.review.length>0);
    document.getElementById('rat-stats').innerHTML=`
      <div class="stat-box"><div class="stat-val">${ratings.length}</div><div class="stat-lbl">Total ratings</div></div>
      <div class="stat-box"><div class="stat-val">${avg}★</div><div class="stat-lbl">Platform avg rating</div></div>
      <div class="stat-box"><div class="stat-val">${withReview.length}</div><div class="stat-lbl">Written reviews</div></div>`;
    if(!ratings.length){document.getElementById('rat-table').innerHTML=`<div class="empty">No ratings yet.</div>`;return;}
    document.getElementById('rat-table').innerHTML=`<table>
      <thead><tr><th>From (role)</th><th>To (role)</th><th>Stars</th><th>Review</th><th>Context</th><th>Date</th></tr></thead>
      <tbody>${ratings.map(r=>`<tr>
        <td><span class="badge ${r.fromRole==='farmer'?'bg':r.fromRole==='broker'?'bb':'ba'}">${r.fromRole||'?'}</span></td>
        <td><span class="badge ${r.toRole==='farmer'?'bg':r.toRole==='broker'?'bb':'ba'}">${r.toRole||'?'}</span></td>
        <td style="color:#f5a623;font-weight:700;">${'★'.repeat(r.stars||0)}${'☆'.repeat(5-(r.stars||0))}</td>
        <td style="max-width:200px;font-size:12px;">${r.review||'<span style="color:#555">No review</span>'}</td>
        <td style="font-size:11px;color:#666">${r.context||'—'}</td>
        <td style="font-size:11px;">${r.createdAt?.toDate?r.createdAt.toDate().toLocaleDateString():'—'}</td>
      </tr>`).join('')}</tbody></table>`;
  }catch(e){document.getElementById('screen-ratings').innerHTML+=`<div class="empty">Error: ${e.message}</div>`;}
}

window.closeModal=function(e){if(!e||e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open');};
window.toast=function(msg,dur=3500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);};
window.toggleSuspend=async function(uid,currentlySuspended){
  const action=currentlySuspended?'reinstate':'suspend';
  const reason=currentlySuspended?'':prompt('Reason for suspension (shown to user):');
  if(!currentlySuspended&&reason===null)return; // cancelled
  if(!confirm(`${action.charAt(0).toUpperCase()+action.slice(1)} this account?`))return;
  try{
    await updateDoc(doc(db,'users',uid),{
      suspended:!currentlySuspended,
      suspendedAt:!currentlySuspended?serverTimestamp():null,
      suspensionReason:reason||null,
    });
    // Log admin action
    await addDoc(collection(db,'admin_messages'),{
      toUid:uid,fromAdmin:true,msgType:'suspension',
      text:currentlySuspended
        ?'✅ Your AgriConnect account has been reinstated. You can now log in again.'
        :`⛔ Your AgriConnect account has been suspended. Reason: ${reason||'Policy violation'}. Contact admin@hub-in.rw to appeal.`,
      read:false,createdAt:serverTimestamp(),
    });
    closeModal();
    toast(`✅ Account ${action}d and user notified.`);
    loadUsers();
  }catch(e){toast('❌ Error: '+e.message);}
};
